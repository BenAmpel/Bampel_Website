<div class="s2sc-root" id="s2sc-root">
  <div class="s2sc-header">
    <div>
      <h3 class="s2sc-title">Semantic Scholar</h3>
      <p class="s2sc-desc">Papers recently citing your work and recommended reads based on your publication portfolio.</p>
    </div>
  </div>
  <div class="s2sc-tabs" id="s2sc-tabs">
    <button class="s2sc-tab s2sc-tab-active" data-tab="citations">📖 Recent Citations</button>
    <button class="s2sc-tab" data-tab="recommendations">💡 Recommended Papers</button>
  </div>
  <div class="s2sc-body" id="s2sc-body">
    <div class="s2sc-loader">Loading Semantic Scholar data…</div>
  </div>
  <div class="s2sc-footer" id="s2sc-footer"></div>
</div>

<style>
.s2sc-root { margin:24px 0; padding:24px; border-radius:16px; border:1px solid var(--card-border,#2a2a2a); background:linear-gradient(135deg,rgba(0,0,0,0.55),rgba(0,0,0,0.15)); box-shadow:0 12px 30px rgba(0,0,0,0.25); }
.s2sc-header { margin-bottom:14px; }
.s2sc-title { margin:0 0 6px; font-size:1.1rem; color:#00ff41; text-transform:uppercase; letter-spacing:0.08em; }
.s2sc-desc { margin:0; font-size:0.82rem; opacity:0.7; line-height:1.4; }
.s2sc-tabs { display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
.s2sc-tab { background:transparent; color:#aaa; border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:7px 16px; font-size:0.82rem; cursor:pointer; transition:all 0.15s; }
.s2sc-tab:hover { border-color:rgba(0,229,255,0.4); color:#00e5ff; }
.s2sc-tab-active { background:rgba(0,229,255,0.1); border-color:rgba(0,229,255,0.5); color:#00e5ff; }
.s2sc-loader { opacity:0.5; padding:32px 0; font-size:0.85rem; text-align:center; }
.s2sc-error { color:#e040fb; padding:24px 0; text-align:center; font-size:0.85rem; }
.s2sc-empty { opacity:0.55; padding:24px 0; text-align:center; font-size:0.85rem; line-height:1.6; }
.s2sc-empty code { background:rgba(255,255,255,0.08); padding:1px 6px; border-radius:4px; font-size:0.82em; }
.s2sc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; }
.s2sc-card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:8px; transition:border-color 0.15s,background 0.15s; }
.s2sc-card:hover { border-color:rgba(0,229,255,0.3); background:rgba(255,255,255,0.04); }
.s2sc-card-title { font-size:0.87rem; font-weight:600; line-height:1.38; color:#e4e4e4; }
.s2sc-card-title a { color:inherit; text-decoration:none; }
.s2sc-card-title a:hover { color:#00e5ff; }
.s2sc-meta { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
.s2sc-chip { font-size:0.63rem; padding:2px 8px; border-radius:10px; }
.s2sc-chip-year { background:rgba(224,64,251,0.1); border:1px solid rgba(224,64,251,0.22); color:#e040fb; }
.s2sc-chip-venue { background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2); color:#00e5ff; }
.s2sc-authors { font-size:0.72rem; color:#aaa; }
.s2sc-context { font-size:0.75rem; color:#888; border-top:1px solid rgba(255,255,255,0.05); padding-top:7px; line-height:1.45; }
.s2sc-context strong { color:#00ff41; font-weight:600; }
.s2sc-link { display:inline-block; margin-top:2px; font-size:0.72rem; color:#00e5ff; text-decoration:none; border:1px solid rgba(0,229,255,0.3); border-radius:6px; padding:3px 10px; transition:background 0.15s; }
.s2sc-link:hover { background:rgba(0,229,255,0.1); }
.s2sc-footer { margin-top:14px; font-size:0.7rem; opacity:0.45; text-align:right; }

body:not(.dark) .s2sc-root { background:rgba(255,255,255,0.96); border-color:#ddd; color:#222; }
body:not(.dark) .s2sc-tab { border-color:#ddd; color:#555; }
body:not(.dark) .s2sc-tab-active { background:rgba(0,130,180,0.08); border-color:rgba(0,130,180,0.4); color:#0077aa; }
body:not(.dark) .s2sc-card { background:#f8f8f8; border-color:#e0e0e0; }
body:not(.dark) .s2sc-card:hover { border-color:#0099cc; }
body:not(.dark) .s2sc-card-title { color:#222; }
body:not(.dark) .s2sc-authors,.s2sc-context { color:#555; }
</style>

<script>
(function () {
  'use strict';

  const bodyEl   = document.getElementById('s2sc-body');
  const footerEl = document.getElementById('s2sc-footer');
  const tabsEl   = document.getElementById('s2sc-tabs');

  let allData = null;
  let activeTab = 'citations';

  function truncate(text, max) {
    if (!text) return '';
    text = text.replace(/\s+/g, ' ').trim();
    return text.length <= max ? text : text.slice(0, max).replace(/\s\S*$/, '') + '…';
  }

  function renderCitationCard(c) {
    const authStr = (c.authors || []).slice(0, 3).join(', ')
      + ((c.authors || []).length > 3 ? ` +${c.authors.length - 3}` : '');
    return `<div class="s2sc-card">
      <div class="s2sc-card-title">
        ${c.url
          ? `<a href="${c.url}" target="_blank" rel="noopener noreferrer">${c.title || 'Untitled'}</a>`
          : (c.title || 'Untitled')}
      </div>
      <div class="s2sc-meta">
        ${c.year ? `<span class="s2sc-chip s2sc-chip-year">${c.year}</span>` : ''}
        ${c.venue ? `<span class="s2sc-chip s2sc-chip-venue">${truncate(c.venue, 40)}</span>` : ''}
      </div>
      ${authStr ? `<div class="s2sc-authors">${authStr}</div>` : ''}
      ${c.cited_paper ? `<div class="s2sc-context">Cites: <strong>${truncate(c.cited_paper, 80)}</strong></div>` : ''}
      ${c.url ? `<a class="s2sc-link" href="${c.url}" target="_blank" rel="noopener noreferrer">View Paper →</a>` : ''}
    </div>`;
  }

  function renderRecCard(r) {
    const authStr = (r.authors || []).slice(0, 3).join(', ')
      + ((r.authors || []).length > 3 ? ` +${r.authors.length - 3}` : '');
    return `<div class="s2sc-card">
      <div class="s2sc-card-title">
        ${r.url
          ? `<a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.title || 'Untitled'}</a>`
          : (r.title || 'Untitled')}
      </div>
      <div class="s2sc-meta">
        ${r.year ? `<span class="s2sc-chip s2sc-chip-year">${r.year}</span>` : ''}
        ${r.venue ? `<span class="s2sc-chip s2sc-chip-venue">${truncate(r.venue, 40)}</span>` : ''}
      </div>
      ${authStr ? `<div class="s2sc-authors">${authStr}</div>` : ''}
      ${r.url ? `<a class="s2sc-link" href="${r.url}" target="_blank" rel="noopener noreferrer">View Paper →</a>` : ''}
    </div>`;
  }

  function renderTab(tab) {
    if (!allData) return;
    const items = tab === 'citations' ? (allData.citations || []) : (allData.recommendations || []);
    if (!items.length) {
      bodyEl.innerHTML = `<div class="s2sc-empty">No ${tab} data yet.<br>Run <code>python scripts/fetch_semantic_scholar.py</code> to populate, then redeploy.</div>`;
      return;
    }
    const cards = tab === 'citations'
      ? items.map(renderCitationCard)
      : items.map(renderRecCard);
    bodyEl.innerHTML = `<div class="s2sc-grid">${cards.join('')}</div>`;
  }

  // Tab switching
  tabsEl.addEventListener('click', e => {
    const btn = e.target.closest('.s2sc-tab');
    if (!btn) return;
    activeTab = btn.dataset.tab;
    tabsEl.querySelectorAll('.s2sc-tab').forEach(t =>
      t.classList.toggle('s2sc-tab-active', t.dataset.tab === activeTab)
    );
    renderTab(activeTab);
  });

  fetch('/data/semantic_scholar.json')
    .then(r => r.ok ? r.json() : null)
    .catch(() => null)
    .then(data => {
      if (!data) {
        bodyEl.innerHTML = '<div class="s2sc-empty">No data yet.<br>Run <code>python scripts/fetch_semantic_scholar.py</code> to populate, then redeploy.</div>';
        return;
      }
      allData = data;
      renderTab(activeTab);
      const citCount = (data.citations || []).length;
      const recCount = (data.recommendations || []).length;
      footerEl.textContent = `${citCount} citations · ${recCount} recommendations · Refreshed ${data.refreshed || 'recently'} via fetch_semantic_scholar.py`;
    });
})();
</script>
