<div class="oa-root" id="oa-root">
  <div class="oa-header">
    <div>
      <h3 class="oa-title">OpenAlex: High-Impact Papers in Your Field</h3>
      <p class="oa-desc">Recent high-citation works in cybersecurity, threat intelligence, and AI security from 250M+ scholarly works.</p>
    </div>
  </div>
  <div class="oa-body" id="oa-body" aria-live="polite" aria-atomic="false">
    <div class="oa-loader">Loading papers…</div>
  </div>
  <div class="oa-footer" id="oa-footer"></div>
</div>

<style>
.oa-root { margin:24px 0; padding:24px; border-radius:16px; border:1px solid var(--card-border,#2a2a2a); background:linear-gradient(135deg,rgba(0,0,0,0.55),rgba(0,0,0,0.15)); box-shadow:0 12px 30px rgba(0,0,0,0.25); }
.oa-header { margin-bottom:18px; }
.oa-title { margin:0 0 6px; font-size:1.1rem; color:#00ff41; text-transform:uppercase; letter-spacing:0.08em; }
.oa-desc { margin:0; font-size:0.82rem; opacity:0.7; line-height:1.4; }
.oa-loader { opacity:0.5; padding:32px 0; font-size:0.85rem; text-align:center; }
.oa-error,.oa-empty { padding:24px 0; text-align:center; font-size:0.85rem; opacity:0.6; }
.oa-error { color:#e040fb; }
.oa-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:14px; }
.oa-card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:8px; transition:border-color 0.15s,background 0.15s; }
.oa-card:hover { border-color:rgba(0,255,65,0.28); background:rgba(255,255,255,0.04); }
.oa-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.oa-card-title { font-size:0.87rem; font-weight:600; line-height:1.38; flex:1; color:#e4e4e4; }
.oa-card-title a { color:inherit; text-decoration:none; }
.oa-card-title a:hover { color:#00ff41; }
.oa-card-title a:focus-visible { outline:2px solid #00e5ff; outline-offset:2px; }
.oa-cites { flex-shrink:0; font-size:0.8rem; font-weight:700; color:#e040fb; white-space:nowrap; padding-top:1px; text-shadow:0 0 8px rgba(224,64,251,0.3); }
.oa-meta { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
.oa-chip { font-size:0.63rem; padding:2px 8px; border-radius:10px; }
.oa-chip-topic { background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2); color:#00e5ff; }
.oa-chip-year { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#aaa; }
.oa-authors { font-size:0.73rem; color:#aaa; }
.oa-venue { font-size:0.73rem; color:#888; font-style:italic; }
.oa-abstract { font-size:0.78rem; color:#bbb; line-height:1.52; border-top:1px solid rgba(255,255,255,0.05); padding-top:8px; }
.oa-footer { margin-top:14px; font-size:0.7rem; opacity:0.45; text-align:right; }

body:not(.dark) .oa-root { background:rgba(255,255,255,0.96); border-color:#ddd; color:#222; }
body:not(.dark) .oa-card { background:#f8f8f8; border-color:#e0e0e0; }
body:not(.dark) .oa-card:hover { border-color:#00aa44; }
body:not(.dark) .oa-card-title { color:#222; }
body:not(.dark) .oa-authors,
body:not(.dark) .oa-venue,
body:not(.dark) .oa-abstract { color:#555; }
</style>

<script>
(function () {
  'use strict';

  const bodyEl   = document.getElementById('oa-body');
  const footerEl = document.getElementById('oa-footer');

  function truncate(text, max) {
    if (!text) return '';
    text = text.replace(/\s+/g, ' ').trim();
    return text.length <= max ? text : text.slice(0, max).replace(/\s\S*$/, '') + '…';
  }

  function fmtCites(n) {
    if (!n) return '';
    if (n >= 1000) return `${(n/1000).toFixed(1)}k cites`;
    return `${n} cites`;
  }

  function renderCard(p) {
    const topics = (p.topics || []).map(t =>
      `<span class="oa-chip oa-chip-topic">${t}</span>`
    ).join('');
    const authorsStr = (p.authors || []).slice(0, 3).join(', ') + (p.authors && p.authors.length > 3 ? ' et al.' : '');
    const citesStr = fmtCites(p.cited_by_count);
    const titleHtml = p.url
      ? `<a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.title || 'Untitled'}</a>`
      : (p.title || 'Untitled');

    return `<div class="oa-card">
      <div class="oa-card-top">
        <div class="oa-card-title">${titleHtml}</div>
        ${citesStr ? `<div class="oa-cites">${citesStr}</div>` : ''}
      </div>
      <div class="oa-meta">
        ${topics}
        ${p.year ? `<span class="oa-chip oa-chip-year">${p.year}</span>` : ''}
      </div>
      ${authorsStr ? `<div class="oa-authors">${authorsStr}</div>` : ''}
      ${p.venue ? `<div class="oa-venue">${p.venue}</div>` : ''}
      ${p.abstract ? `<div class="oa-abstract">${truncate(p.abstract, 160)}</div>` : ''}
    </div>`;
  }

  fetch('/data/openalex.json')
    .then(r => r.ok ? r.json() : null)
    .catch(() => null)
    .then(data => {
      if (!data || !Array.isArray(data.papers) || !data.papers.length) {
        bodyEl.innerHTML = '<div class="oa-empty">No data yet. Run <code>python scripts/fetch_openalex.py</code> to populate.</div>';
        return;
      }
      bodyEl.innerHTML = `<div class="oa-grid">${data.papers.map(renderCard).join('')}</div>`;
      footerEl.textContent = `${data.papers.length} papers · Refreshed ${data.refresh_date || 'recently'} via fetch_openalex.py`;
    });
})();
</script>
