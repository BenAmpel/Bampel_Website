{{/* Altmetric Badge Shortcode - Usage: {{< altmetric doi="10.xxxx/xxxxx" >}} */}}
{{ $doi := .Get "doi" }}
{{ if $doi }}
<div class="altmetric-badge-section" style="margin: 30px 0; padding: 20px; background: #f5f5f5; border-radius: 12px; border: 1px solid #ddd;">
  <style>
    .dark .altmetric-badge-section {
      background: rgba(10,10,10,0.6) !important;
      border-color: #2a2a2a !important;
    }
  </style>
  <h4 style="margin: 0 0 15px 0; font-size: 1rem; font-weight: 600;">Altmetric Attention Score</h4>
  <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
    <div data-badge-type="medium-donut" data-doi="{{ $doi }}" data-badge-popover="right" class="altmetric-embed"></div>
    <div style="flex: 1; min-width: 200px;">
      <p style="margin: 0; font-size: 0.9rem; color: #888;">
        This badge shows attention from news, blogs, social media, policy documents, and more.
        <a href="https://www.altmetric.com/details/doi/{{ $doi }}" target="_blank" style="color: #00e5ff;">View details <span aria-hidden="true">→</span></a>
      </p>
    </div>
  </div>
</div>
<script type="text/javascript">
(function() {
  function initBadge() {
    if (typeof _altmetric_embed_init === 'function') {
      _altmetric_embed_init();
    } else {
      // Load the script if not present
      var s = document.createElement('script');
      s.src = 'https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js';
      s.onload = function() {
        if (typeof _altmetric_embed_init === 'function') _altmetric_embed_init();
      };
      document.head.appendChild(s);
    }
  }
  if (document.readyState === 'complete') {
    initBadge();
  } else {
    window.addEventListener('load', initBadge);
  }
  setTimeout(initBadge, 1000);
  setTimeout(initBadge, 3000);
})();
</script>
{{ end }}
